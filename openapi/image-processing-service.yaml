openapi: 3.1.0
info:
  title: Image Processing Service
  description: |
    Сервис генерации и редактирования изображений.
    
    Сервис отвечает за:
    - Генерацию изображений по текстовому описанию
    - Редактирование существующих изображений
    - Взаимодействие с API провайдеров (DALL-E, Kandinsky, YandexART)
    - Хранение результатов в S3-совместимом хранилище
    
    **Технологии:** FastAPI, RabbitMQ, S3 (MinIO), PostgreSQL
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:8002
    description: Local development server
  - url: http://image-processing:8002
    description: Docker/Kubernetes internal

tags:
  - name: images
    description: Генерация и редактирование изображений
  - name: providers
    description: Информация о провайдерах
  - name: health
    description: Проверка состояния сервиса

paths:
  /v1/images/jobs:
    get:
      tags:
        - images
      summary: Получить список задач генерации
      description: Возвращает список задач генерации изображений с фильтрацией
      operationId: listImageJobs
      parameters:
        - name: user_request_id
          in: query
          required: false
          description: Фильтр по UUID запроса пользователя
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          description: Фильтр по статусу
          schema:
            type: string
            enum: [pending, processing, done, failed]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Список задач
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageJobListResponse'

    post:
      tags:
        - images
      summary: Создать задачу генерации изображения
      description: |
        Создаёт новую задачу для генерации изображения.
        
        Поддерживаемые операции:
        - `generate`: генерация нового изображения по промпту
        - `edit`: редактирование существующего изображения
        - `variation`: создание вариации существующего изображения
      operationId: createImageJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageJobRequest'
      responses:
        '202':
          description: Задача принята в обработку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageJobCreatedResponse'
        '400':
          description: Некорректные данные запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Неизвестный провайдер или неподдерживаемая операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/images/jobs/{job_id}:
    get:
      tags:
        - images
      summary: Получить информацию о задаче
      description: Возвращает детальную информацию о задаче генерации
      operationId: getImageJob
      parameters:
        - name: job_id
          in: path
          required: true
          description: UUID задачи
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация о задаче
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageJobResponse'
        '404':
          description: Задача не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - images
      summary: Отменить задачу
      description: Отменяет задачу генерации, если она ещё не завершена
      operationId: cancelImageJob
      parameters:
        - name: job_id
          in: path
          required: true
          description: UUID задачи
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Задача отменена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageJobResponse'
        '404':
          description: Задача не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Задача уже завершена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/images/{image_id}:
    get:
      tags:
        - images
      summary: Получить изображение
      description: Возвращает метаданные и URL изображения
      operationId: getImage
      parameters:
        - name: image_id
          in: path
          required: true
          description: UUID изображения
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация об изображении
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageInfo'
        '404':
          description: Изображение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - images
      summary: Удалить изображение
      description: Удаляет изображение из хранилища
      operationId: deleteImage
      parameters:
        - name: image_id
          in: path
          required: true
          description: UUID изображения
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Изображение удалено
        '404':
          description: Изображение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/providers:
    get:
      tags:
        - providers
      summary: Получить список провайдеров
      description: Возвращает список доступных провайдеров для генерации изображений
      operationId: listProviders
      responses:
        '200':
          description: Список провайдеров
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderListResponse'

  /v1/providers/{provider_id}:
    get:
      tags:
        - providers
      summary: Получить информацию о провайдере
      description: Возвращает детальную информацию о провайдере
      operationId: getProvider
      parameters:
        - name: provider_id
          in: path
          required: true
          description: ID провайдера
          schema:
            type: string
          example: "dalle-3"
      responses:
        '200':
          description: Информация о провайдере
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderInfo'
        '404':
          description: Провайдер не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/health/liveness:
    get:
      tags:
        - health
      summary: Проверка живости сервиса
      operationId: healthLiveness
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/health/readiness:
    get:
      tags:
        - health
      summary: Проверка готовности сервиса
      operationId: healthReadiness
      responses:
        '200':
          description: Сервис готов к работе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Сервис не готов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    CreateImageJobRequest:
      type: object
      required:
        - prompt
        - user_request_id
        - consumer_service_id
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 4000
          description: Текстовое описание для генерации
          example: "Закат над горами в стиле импрессионизма"
        negative_prompt:
          type: string
          maxLength: 2000
          nullable: true
          description: Негативный промпт (что исключить)
          example: "размытое, низкое качество"
        user_request_id:
          type: string
          format: uuid
          description: UUID запроса пользователя
        consumer_service_id:
          type: string
          description: ID сервиса-потребителя
          example: "api-router"
        provider_id:
          type: string
          default: "dalle-3"
          description: ID провайдера для генерации
          enum: [dalle-3, kandinsky, yandexart]
        operation:
          type: string
          default: "generate"
          enum: [generate, edit, variation]
          description: Тип операции
        source_image_url:
          type: string
          format: uri
          nullable: true
          description: URL исходного изображения (для edit/variation)
        size:
          type: string
          default: "1024x1024"
          enum: ["256x256", "512x512", "1024x1024", "1024x1792", "1792x1024"]
          description: Размер изображения
        quality:
          type: string
          default: "standard"
          enum: [standard, hd]
          description: Качество изображения
        style:
          type: string
          default: "vivid"
          enum: [vivid, natural]
          description: Стиль изображения (только для DALL-E 3)
        webhook_url:
          type: string
          format: uri
          nullable: true
          description: URL для отправки результата

    ImageJobCreatedResponse:
      type: object
      required:
        - job_id
        - status
      properties:
        job_id:
          type: string
          format: uuid
        user_request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [accepted]
        message:
          type: string
          example: "Задача принята в обработку"

    ImageJobResponse:
      type: object
      required:
        - job_id
        - user_request_id
        - status
        - created_at
      properties:
        job_id:
          type: string
          format: uuid
        user_request_id:
          type: string
          format: uuid
        provider_id:
          type: string
        operation:
          type: string
          enum: [generate, edit, variation]
        prompt:
          type: string
        status:
          type: string
          enum: [pending, processing, done, failed, cancelled]
        result:
          $ref: '#/components/schemas/ImageJobResult'
          nullable: true
        error_message:
          type: string
          nullable: true
        processing_time_ms:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true

    ImageJobResult:
      type: object
      required:
        - image_id
        - image_url
        - cost_usd
      properties:
        image_id:
          type: string
          format: uuid
        image_url:
          type: string
          format: uri
          description: URL для скачивания изображения
        s3_key:
          type: string
          description: Ключ в S3 хранилище
        width:
          type: integer
        height:
          type: integer
        format:
          type: string
          enum: [png, jpeg, webp]
        size_bytes:
          type: integer
        cost_usd:
          type: number
          format: float
          description: Стоимость генерации в USD

    ImageJobListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImageJobResponse'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ImageInfo:
      type: object
      required:
        - image_id
        - image_url
        - created_at
      properties:
        image_id:
          type: string
          format: uuid
        image_url:
          type: string
          format: uri
        s3_key:
          type: string
        width:
          type: integer
        height:
          type: integer
        format:
          type: string
          enum: [png, jpeg, webp]
        size_bytes:
          type: integer
        prompt:
          type: string
        provider_id:
          type: string
        created_at:
          type: string
          format: date-time

    ProviderInfo:
      type: object
      required:
        - provider_id
        - display_name
        - supported_operations
      properties:
        provider_id:
          type: string
          example: "dalle-3"
        display_name:
          type: string
          example: "DALL-E 3"
        description:
          type: string
        supported_operations:
          type: array
          items:
            type: string
            enum: [generate, edit, variation]
        supported_sizes:
          type: array
          items:
            type: string
          example: ["1024x1024", "1024x1792", "1792x1024"]
        max_prompt_length:
          type: integer
          example: 4000
        price_per_image:
          type: number
          format: float
          description: Цена за 1 изображение в USD
          example: 0.04

    ProviderListResponse:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderInfo'

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        details:
          type: object
          properties:
            database:
              type: string
              enum: [ok, error]
            rabbitmq:
              type: string
              enum: [ok, error]
            s3:
              type: string
              enum: [ok, error]

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Код ошибки
          example: "NOT_FOUND"
        message:
          type: string
          description: Описание ошибки
        details:
          type: object
          additionalProperties: true
